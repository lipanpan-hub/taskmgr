<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>定时任务管理器</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 页眉 -->
  <header class="header">
    <div class="header-left">
      <h1 class="app-title">定时任务管理器</h1>
    </div>
    <div class="header-right">
      <select id="taskFilter" class="filter-select">
        <option value="all">全部任务</option>
        <option value="active">已启用</option>
        <option value="inactive">已禁用</option>
      </select>
      <button id="themeToggle" class="icon-btn" title="切换主题">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button id="settingsBtn" class="icon-btn" title="设置">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v6m0 6v10M1 12h6m6 0h10"/>
        </svg>
      </button>
      <div class="user-avatar">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
    </div>
  </header>

  <!-- 任务列表 -->
  <main class="main-content">
    <div id="taskList" class="task-list"></div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="input-container">
      <input type="text" id="taskNameInput" class="task-input" placeholder="输入任务名称...">
      <button id="addTaskBtn" class="add-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
  </footer>

  <!-- 创建任务表单模态框 -->
  <div id="taskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>创建定时任务</h2>
        <button class="close-btn">&times;</button>
      </div>
      <form id="taskForm" class="task-form">
        <div class="form-row">
          <div class="form-group">
            <label for="formTaskName">任务名称</label>
            <input type="text" id="formTaskName" required readonly>
          </div>
          <div class="form-group">
            <label for="formDescription">任务描述</label>
            <input type="text" id="formDescription" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="formExecutable">可执行文件路径</label>
            <input type="text" id="formExecutable" required>
          </div>
          <div class="form-group">
            <label for="formArguments">执行参数</label>
            <input type="text" id="formArguments">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="formTriggerType">触发类型</label>
            <select id="formTriggerType" required>
              <option value="once">一次性</option>
              <option value="daily">每天</option>
              <option value="weekly">每周</option>
              <option value="monthly">每月</option>
            </select>
          </div>
          <div class="form-group">
            <label for="formStartTime">开始时间</label>
            <input type="datetime-local" id="formStartTime" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group checkbox-group">
            <label>
              <input type="checkbox" id="formAllowMissed">
              <span>允许在错过启动时间后补执行</span>
            </label>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-cancel">取消</button>
          <button type="submit" class="btn btn-primary">创建任务</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
