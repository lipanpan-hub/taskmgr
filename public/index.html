<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>定时任务管理器</title>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="flex flex-col h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white transition-colors duration-300" x-data="taskManager()" x-init="init()">
  <!-- 页眉 -->
  <header class="flex justify-between items-center px-8 py-4 bg-white dark:bg-gray-800 border-b border-blue-200 dark:border-gray-700 shadow-sm">
    <div class="flex items-center gap-3">
      <i class="fas fa-tasks text-2xl text-blue-500"></i>
      <h1 class="text-2xl font-semibold">定时任务管理器</h1>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2 text-sm">
        <div :class="connectionStatus === 'connected' ? 'w-2 h-2 rounded-full bg-green-500 animate-pulse' : 'w-2 h-2 rounded-full bg-red-500'"></div>
        <span class="text-gray-600 dark:text-gray-400" x-text="connectionStatus === 'connected' ? '已连接' : '未连接'"></span>
      </div>
      <button @click="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-xl" title="切换主题">
        <i :class="isDark ? 'fas fa-sun' : 'fas fa-moon'"></i>
      </button>
    </div>
  </header>

  <!-- 任务列表 -->
  <main class="flex-1 overflow-y-auto p-8">
    <!-- 任务列表 -->
    <div class="max-w-4xl mx-auto">
      <template x-if="loading">
        <div class="text-center py-8">
          <i class="fas fa-spinner fa-spin text-3xl text-gray-400"></i>
        </div>
      </template>
      
      <template x-if="!loading && filteredTasks.length === 0">
        <div class="text-center py-16">
          <i class="fas fa-inbox text-6xl text-gray-300 dark:text-gray-600 mb-4"></i>
          <p class="text-gray-500 dark:text-gray-400 text-lg">暂无任务</p>
        </div>
      </template>
      
      <template x-for="task in filteredTasks" :key="task.id">
        <div class="bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5 mb-4 transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg dark:hover:shadow-black/30">
          <div class="flex justify-between items-start mb-4 pb-4 border-b border-gray-200 dark:border-gray-700">
            <div class="flex-1">
              <div class="flex items-center gap-3 mb-2">
                <div class="text-lg font-semibold text-gray-900 dark:text-gray-100" x-text="task.name"></div>
                <span :class="task.enabled ? 'inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300' : 'inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-300'">
                  <i :class="task.enabled ? 'fas fa-check-circle mr-1' : 'fas fa-pause-circle mr-1'"></i>
                  <span x-text="task.enabled ? '已启用' : '已禁用'"></span>
                </span>
              </div>
              <div x-show="task.description" class="text-gray-500 dark:text-gray-400 text-sm mt-1" x-text="task.description"></div>
            </div>
            <div class="flex gap-2 flex-shrink-0">
              <button @click="toggleTask(task)" class="bg-transparent border-0 cursor-pointer p-2 text-gray-500 dark:text-gray-400 text-base transition-all rounded-md hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-blue-500 dark:hover:text-blue-400" :title="task.enabled ? '禁用' : '启用'">
                <i :class="task.enabled ? 'fas fa-pause' : 'fas fa-play'"></i>
              </button>
              <button @click="showMessage('编辑功能开发中', 'info')" class="bg-transparent border-0 cursor-pointer p-2 text-gray-500 dark:text-gray-400 text-base transition-all rounded-md hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-purple-500 dark:hover:text-purple-400" title="编辑">
                <i class="fas fa-edit"></i>
              </button>
              <button @click="deleteTask(task.id)" class="bg-transparent border-0 cursor-pointer p-2 text-gray-500 dark:text-gray-400 text-base transition-all rounded-md hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-red-500 dark:hover:text-red-400" title="删除">
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>
          </div>
          <div class="grid grid-cols-[repeat(auto-fit,minmax(250px,1fr))] gap-3 text-sm">
            <div class="flex items-center p-2 bg-white dark:bg-gray-900 rounded-md border border-gray-200 dark:border-gray-700">
              <i class="fas fa-file-code text-blue-500 mr-2"></i>
              <span class="font-medium text-gray-500 dark:text-gray-400 mr-2">执行文件:</span>
              <span class="text-gray-900 dark:text-gray-200 break-all" x-text="task.executablePath"></span>
            </div>
            <div x-show="task.arguments" class="flex items-center p-2 bg-white dark:bg-gray-900 rounded-md border border-gray-200 dark:border-gray-700">
              <i class="fas fa-terminal text-green-500 mr-2"></i>
              <span class="font-medium text-gray-500 dark:text-gray-400 mr-2">参数:</span>
              <span class="text-gray-900 dark:text-gray-200 break-all" x-text="task.arguments"></span>
            </div>
            <div class="flex items-center p-2 bg-white dark:bg-gray-900 rounded-md border border-gray-200 dark:border-gray-700">
              <i class="fas fa-clock text-purple-500 mr-2"></i>
              <span class="font-medium text-gray-500 dark:text-gray-400 mr-2">触发:</span>
              <span class="text-gray-900 dark:text-gray-200 break-all" x-text="getTriggerTypeText(task.triggerType)"></span>
            </div>
            <div class="flex items-center p-2 bg-white dark:bg-gray-900 rounded-md border border-gray-200 dark:border-gray-700">
              <i class="fas fa-calendar text-orange-500 mr-2"></i>
              <span class="font-medium text-gray-500 dark:text-gray-400 mr-2">创建:</span>
              <span class="text-gray-900 dark:text-gray-200 break-all" x-text="formatDateTime(task.createdAt)"></span>
            </div>
          </div>
        </div>
      </template>
    </div>
  </main>

  <!-- Toast 消息 -->
  <div x-show="toast.show" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 transform translate-y-2" x-transition:enter-end="opacity-100 transform translate-y-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 transform translate-y-0" x-transition:leave-end="opacity-0 transform translate-y-2" :class="`fixed top-5 right-5 px-5 py-3 rounded-lg flex items-center text-sm font-medium shadow-lg z-[9999] toast-${toast.type}`" style="display: none;">
    <i :class="`fas ${toast.icon} mr-2`"></i>
    <span x-text="toast.message"></span>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
